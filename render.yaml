services:
  - type: web
    name: dpmbg
    runtime: python
    buildCommand: bash build.sh
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SCANNER_KEY
        sync: false
      - key: CLOUD_PRINT_KEY
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: TZ_REGION
        value: Asia/Jakarta
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20.11.0"
